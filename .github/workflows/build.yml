name: Angular 13 Build Pipeline

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_angular:
    name: Build Angular Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '14.21.3'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Bundle
        run: npm run build -- --configuration=production

      - name: Upload Build Folder Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-production-build
          path: dist/angular-13/

      - name: Package Build as Zip
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ZIP_NAME="angular-13_${GITHUB_REF_NAME}.zip"
          else
            ZIP_NAME="angular-13_${GITHUB_SHA::7}.zip"
          fi

          echo "Creating $ZIP_NAME"
          cd dist/angular-13/
          zip -r "../../$ZIP_NAME" .
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular13-build-zip
          path: ${{ env.ZIP_PATH }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Angular 13 Release ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}